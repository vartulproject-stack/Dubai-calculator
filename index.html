<!DOCTYPE html>
<html>
<head>
    <title>Dubai Calculator - Day 8/100 ✈️💎</title>
    <style>
        body { 
            background: #0d1117; 
            color: white; 
            font-family: Arial; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
        }
        .calculator { 
            background: #161b22; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 0 20px #58a6ff;
        }
        #display { 
            width: 100%; 
            height: 60px; 
            font-size: 2rem; 
            text-align: right; 
            margin-bottom: 15px; 
            background: #0d1117; 
            color: #58a6ff; 
            border: none; 
            border-radius: 8px;
            padding: 10px;
        }
        .buttons { 
            display: grid; 
            grid-template-columns: repeat(4, 70px); 
            gap: 10px; 
        }
        button { 
            height: 60px; 
            font-size: 1.5rem; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            background: #21262d; 
            color: white;
        }
        button:hover { background: #30363d; }
        .operator { background: #f0883e; }
        .operator:hover { background: #ff9f4d; }
        .equals { background: #238636; }
        .equals:hover { background: #2ea043; }
        .clear { background: #da3633; }
        .clear:hover { background: #f85149; }
        h3 { text-align: center; color: #58a6ff; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="calculator">
        <h3>DUBAI CALCULATOR ✈️💎 8%</h3>
        <input type="text" id="display" readonly>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="appendToDisplay('/')">/</button>
            <button onclick="appendToDisplay('*')">*</button>
            <button class="operator" onclick="deleteLast()">⌫</button>
            
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>
            
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="equals" onclick="calculate()">=</button>
            
            <button onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
            <button onclick="appendToDisplay('.')">.</button>
        </div>
    </div>

    <script>
        // BHAI YE 3 FUNCTION TU SAMAJH - INTERVIEW MEIN POOCHENGE 🔥
        let display = document.getElementById('display');

        // 1. BUTTON DABANE PE NUMBER LIKHTA HAI
        function appendToDisplay(value) {
            display.value += value; // Purane me naya jod do
        }

        // 2. C BUTTON = SAB SAAF
        function clearDisplay() {
            display.value = ''; // Khali kar do
        }

        // 3. ⌫ BUTTON = LAST WALA HATA DO  
        function deleteLast() {
            display.value = display.value.slice(0, -1); // Last letter kaat do
        }

        // 4. = BUTTON = HISAB LAGA DO - SABSE IMPORTANT
        function calculate() {
            try {
                // eval() dangerous hai par shuru me chalega
                // Baad me khud ka logic banayenge
                display.value = eval(display.value); 
            } catch {
                display.value = 'Error'; // Galat likha to Error
            }
        }
    </script>
</body>
</html>
